spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/usersdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:usersuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.web.cors.allowed-origin-patterns=http://localhost:3000,http://localhost:3001
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.web.cors.allowed-headers=*

jwt.secret=${JWT_SECRET:bibliotheque-online-userservice-secret-key-2026-change-me}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
